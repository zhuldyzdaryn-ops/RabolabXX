<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная работа: Изучение полупроводникового диода</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-custom::-webkit-scrollbar { width: 6px; }
        .scrollbar-custom::-webkit-scrollbar-track { background: #f8fafc; border-radius: 10px; }
        .scrollbar-custom::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; border: 2px solid #f8fafc; }
        .scrollbar-custom::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        input[type=range] { accent-color: #2563eb; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Переключатель языка -->
    <div class="fixed top-6 right-6 z-50">
        <button id="langBtn" onclick="toggleLang()" class="bg-white border border-slate-200 text-slate-700 px-6 py-2 rounded-full font-bold hover:shadow-lg transition-all active:scale-95 shadow-md">
            RU | KZ
        </button>
    </div>

    <div class="max-w-7xl mx-auto p-4 md:p-10 space-y-8">
        <!-- Шапка -->
        <header class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-4 mb-3">
                <div class="p-3 bg-blue-600 rounded-2xl text-white shadow-lg">
                    <i data-lucide="activity" class="w-8 h-8"></i>
                </div>
                <h1 id="title" class="text-3xl font-black text-slate-800 tracking-tight">Лабораторная работа: Изучение полупроводникового диода</h1>
            </div>
            <p id="goal" class="text-base text-slate-500 bg-slate-50 p-4 rounded-2xl border border-slate-100 italic">
                Цель: изучение принципа действия диода и снятие его вольтамперной характеристики (ВАХ).
            </p>
        </header>

        <!-- Схема и Управление -->
        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-full flex flex-col">
                <h3 id="circuitTitle" class="text-xs font-bold text-slate-400 mb-6 uppercase flex items-center gap-2 tracking-wider">
                    <i data-lucide="power" class="w-4 h-4"></i> ЭЛЕКТРИЧЕСКАЯ СХЕМА
                </h3>
                <div class="flex-grow flex items-center justify-center min-h-[250px]" id="circuitSvgContainer"></div>
            </div>

            <div class="lg:col-span-5 bg-white p-8 rounded-3xl shadow-xl border border-slate-200 flex flex-col justify-between space-y-6">
                <div class="space-y-6">
                    <h2 id="modeTitle" class="text-xl font-black flex items-center gap-2 text-slate-800 border-b pb-4">
                        <i data-lucide="zap" class="text-amber-500 w-5 h-5"></i> РЕЖИМ ВКЛЮЧЕНИЯ
                    </h2>
                    <div class="flex bg-slate-100 p-2 rounded-[22px] gap-2">
                        <button id="btnForward" onclick="setMode(true)" class="flex-1 py-4 rounded-[18px] font-black text-sm uppercase transition-all bg-white shadow-lg text-blue-600">ПРЯМОЕ</button>
                        <button id="btnReverse" onclick="setMode(false)" class="flex-1 py-4 rounded-[18px] font-black text-sm uppercase transition-all text-slate-500 hover:text-slate-700">ОБРАТНОЕ</button>
                    </div>

                    <div class="space-y-6 pt-4">
                        <div class="flex justify-between items-center px-1">
                            <label id="uLabel" class="font-black text-slate-800 text-lg uppercase tracking-tight">НАПРЯЖЕНИЕ (U)</label>
                            <span class="text-2xl font-mono font-black text-blue-700 bg-blue-50 px-5 py-2 rounded-2xl border-2 border-blue-100">
                                <span id="uDisplay">0</span> <span id="uUnit">В</span>
                            </span>
                        </div>
                        <input type="range" id="voltageInput" min="0" max="0.8" step="0.05" value="0" class="w-full h-4 bg-slate-200 rounded-full appearance-none cursor-pointer" oninput="updateVoltage(this.value)">
                    </div>
                </div>

                <div class="p-8 bg-slate-900 rounded-[32px] text-center shadow-2xl border-4 border-slate-800 relative overflow-hidden">
                    <label id="iLabel" class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-black block mb-2">СИЛА ТОКА (I)</label>
                    <div class="text-5xl font-mono font-black text-amber-400">
                        <span id="iDisplay">0.000</span> <span id="iUnit" class="text-xl text-amber-500/50 ml-1">мА</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <button id="recordBtn" onclick="record()" class="py-5 bg-blue-600 text-white rounded-2xl font-black text-lg hover:bg-blue-700 active:scale-95 transition-all shadow-xl shadow-blue-200">ЗАПИСАТЬ</button>
                    <button id="resetBtn" onclick="resetAll()" class="py-5 bg-slate-100 text-slate-600 rounded-2xl font-black text-lg hover:bg-slate-200 active:scale-95 transition-all flex items-center justify-center gap-2 border border-slate-200">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i> СБРОС
                    </button>
                </div>
            </div>
        </div>

        <!-- График и Таблица -->
        <div class="grid lg:grid-cols-12 gap-8 pb-10">
            <div class="lg:col-span-8 bg-white p-6 rounded-2xl shadow-lg border border-slate-200 h-full flex flex-col min-h-[500px]">
                <h3 id="graphTitle" class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <i data-lucide="line-chart" class="text-blue-600 w-5 h-5"></i> ГРАФИК ВАХ (АСИММЕТРИЧНЫЙ)
                </h3>
                <div class="flex-grow flex flex-col items-center" id="graphContainer"></div>
            </div>

            <div class="lg:col-span-4 bg-white p-8 rounded-3xl shadow-lg border border-slate-200 flex flex-col h-[500px]">
                <h2 id="tableTitle" class="text-xl font-black flex items-center gap-3 border-b pb-5 mb-6 text-slate-800">
                    <div class="p-2 bg-emerald-100 rounded-xl text-emerald-600"><i data-lucide="table" class="w-5 h-5"></i></div> ТАБЛИЦА ИЗМЕРЕНИЙ
                </h2>
                <div class="overflow-y-auto flex-grow pr-3 scrollbar-custom">
                    <table class="w-full text-sm border-separate border-spacing-y-3" id="dataTable">
                        <thead class="sticky top-0 bg-white z-10">
                            <tr class="text-slate-400 text-[10px] uppercase font-black tracking-widest">
                                <th class="pb-3 text-left px-4">№</th>
                                <th class="pb-3 text-center" id="colU">U (В)</th>
                                <th class="pb-3 text-right px-4" id="colI">I</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lang = 'ru';
        let isForward = true;
        let voltage = 0;
        let measurements = [];

        const t = {
            ru: {
                title: "Лабораторная работа: Изучение полупроводникового диода",
                goal: "Цель: изучение принципа действия диода и снятие его вольтамперной характеристики (ВАХ).",
                mode: "РЕЖИМ ВКЛЮЧЕНИЯ",
                forward: "ПРЯМОЕ",
                reverse: "ОБРАТНОЕ",
                uLabel: "НАПРЯЖЕНИЕ (U)",
                iLabel: "СИЛА ТОКА (I)",
                btnRecord: "ЗАПИСАТЬ",
                btnReset: "СБРОС",
                table: "ТАБЛИЦА ИЗМЕРЕНИЙ",
                graph: "ГРАФИК ВАХ (АСИММЕТРИЧНЫЙ)",
                colU: "U (В)",
                colI: "I",
                ma: "мА",
                ua: "мкА",
                vUnit: "В",
                circuit: "ЭЛЕКТРИЧЕСКАЯ СХЕМА",
                source: "Источник (E)",
                rheostat: "Реостат (R)",
                empty: "Нет данных",
                hint: "Сделайте еще {n} измерений",
                ready: "График построен"
            },
            kz: {
                title: "Зертханалық жұмыс: Жартылай өткізгіш диодты зерттеу",
                goal: "Мақсаты: диодтың жұмыс істеу принципін зерттеу және оның вольтамперлік сипаттамасын (ВАС) түсіру.",
                mode: "ҚОСУ РЕЖИМІ",
                forward: "ТУРА",
                reverse: "КЕРІ",
                uLabel: "КЕРНЕУ (U)",
                iLabel: "ТОК КҮШІ (I)",
                btnRecord: "ЖАЗУ",
                btnReset: "ҚАЛПЫНА КЕЛТІРУ",
                table: "ӨЛШЕУЛЕР КЕСТЕСІ",
                graph: "ВАС ГРАФИГІ (АСИММЕТРИЯЛЫ)",
                colU: "U (В)",
                colI: "I ток",
                ma: "мА",
                ua: "мкА",
                vUnit: "В",
                circuit: "ЭЛЕКТРЛІК СХЕМА",
                source: "Көз (E)",
                rheostat: "Реостат (R)",
                empty: "Деректер жоқ",
                hint: "Тағы {n} өлшеу жасаңыз",
                ready: "График құрылды"
            }
        };

        function calculateCurrent(v, forward) {
            if (v === 0) return 0;
            if (forward) {
                const Is = 0.0001; 
                const Vt = 0.05; 
                const val = Is * (Math.exp(v / Vt) - 1);
                return Math.min(val, 50); 
            } else {
                const Is = 0.5; 
                return Is * (1 - Math.exp(-v / 2));
            }
        }

        function updateUI() {
            const curT = t[lang];
            document.getElementById('title').innerText = curT.title;
            document.getElementById('goal').innerText = curT.goal;
            document.getElementById('modeTitle').innerHTML = `<i data-lucide="zap" class="text-amber-500 w-5 h-5"></i> ${curT.mode}`;
            document.getElementById('btnForward').innerText = curT.forward;
            document.getElementById('btnReverse').innerText = curT.reverse;
            document.getElementById('uLabel').innerText = curT.uLabel;
            document.getElementById('iLabel').innerText = curT.iLabel;
            document.getElementById('recordBtn').innerText = curT.btnRecord;
            document.getElementById('resetBtn').innerHTML = `<i data-lucide="refresh-cw" class="w-5 h-5"></i> ${curT.btnReset}`;
            document.getElementById('tableTitle').innerHTML = `<div class="p-2 bg-emerald-100 rounded-xl text-emerald-600"><i data-lucide="table" class="w-5 h-5"></i></div> ${curT.table}`;
            document.getElementById('graphTitle').innerHTML = `<i data-lucide="line-chart" class="text-blue-600 w-5 h-5"></i> ${curT.graph}`;
            document.getElementById('colU').innerText = curT.colU;
            document.getElementById('colI').innerText = curT.colI;
            document.getElementById('circuitTitle').innerHTML = `<i data-lucide="power" class="w-4 h-4"></i> ${curT.circuit}`;
            
            document.getElementById('uDisplay').innerText = voltage;
            const curVal = calculateCurrent(voltage, isForward);
            document.getElementById('iDisplay').innerText = curVal.toFixed(3);
            document.getElementById('iUnit').innerText = isForward ? curT.ma : curT.ua;

            renderCircuit();
            renderTable();
            renderGraph();
            lucide.createIcons();
        }

        function toggleLang() {
            lang = lang === 'ru' ? 'kz' : 'ru';
            updateUI();
        }

        function setMode(forward) {
            isForward = forward;
            voltage = 0;
            const input = document.getElementById('voltageInput');
            input.max = forward ? 0.8 : 10;
            input.step = forward ? 0.05 : 0.5;
            input.value = 0;
            
            document.getElementById('btnForward').className = forward ? 
                'flex-1 py-4 rounded-[18px] font-black text-sm uppercase transition-all bg-white shadow-lg text-blue-600' : 
                'flex-1 py-4 rounded-[18px] font-black text-sm uppercase transition-all text-slate-500 hover:text-slate-700';
            
            document.getElementById('btnReverse').className = !forward ? 
                'flex-1 py-4 rounded-[18px] font-black text-sm uppercase transition-all bg-white shadow-lg text-blue-600' : 
                'flex-1 py-4 rounded-[18px] font-black text-sm uppercase transition-all text-slate-500 hover:text-slate-700';
            
            updateUI();
        }

        function updateVoltage(val) {
            voltage = parseFloat(val);
            updateUI();
        }

        function record() {
            const curVal = calculateCurrent(voltage, isForward);
            measurements.push({
                u: voltage,
                i: curVal.toFixed(3),
                unit: isForward ? t[lang].ma : t[lang].ua,
                forward: isForward,
                val: isForward ? curVal : -curVal / 1000,
                uSign: isForward ? voltage : -voltage
            });
            updateUI();
        }

        function resetAll() {
            measurements = [];
            voltage = 0;
            document.getElementById('voltageInput').value = 0;
            updateUI();
        }

        function renderCircuit() {
            const maxRange = isForward ? 0.8 : 10;
            const h = 100, pos = (voltage / maxRange) * h, active = voltage > 0, color = active ? "#3b82f6" : "#334155";
            const svg = `
                <svg viewBox="0 0 450 250" class="w-full max-w-[420px]">
                    <path d="M 60,150 L 60,50 L 150,50 L 150,80" fill="none" stroke="#334155" stroke-width="2.5" />
                    <path d="M 60,150 L 60,210 L 150,210 L 150,180" fill="none" stroke="#334155" stroke-width="2.5" />
                    <g transform="translate(140, 80)">
                        <rect width="20" height="${h}" fill="white" stroke="#334155" stroke-width="2.5" />
                        <g transform="translate(0, ${h - pos})">
                            <line x1="20" y1="0" x2="60" y2="0" stroke="${color}" stroke-width="2.5" />
                            <path d="M 20,0 L 10,-5 L 10,5 Z" fill="#ef4444" />
                        </g>
                        <text x="-15" y="${h/2}" font-size="10" text-anchor="middle" fill="#94a3b8" transform="rotate(-90 -15 ${h/2})">${t[lang].rheostat}</text>
                    </g>
                    <path d="M 200,50 L 320,50 L 320,100 M 320,160 L 320,210 L 150,210" fill="none" stroke="${color}" stroke-width="2.5" />
                    <line x1="200" y1="${80 + (h - pos)}" x2="200" y2="50" stroke="${color}" stroke-width="2.5" />
                    <g transform="translate(60, 150)">
                        <line x1="-15" y1="-5" x2="15" y2="-5" stroke="#1e293b" stroke-width="5" />
                        <line x1="-8" y1="5" x2="8" y2="5" stroke="#1e293b" stroke-width="2.5" />
                        <text x="-28" y="-12" font-size="16" font-weight="900" fill="${isForward ? '#ef4444' : '#3b82f6'}">${isForward ? '+' : '−'}</text>
                        <text x="-28" y="24" font-size="16" font-weight="900" fill="${isForward ? '#3b82f6' : '#ef4444'}">${isForward ? '−' : '+'}</text>
                    </g>
                    <g transform="translate(320, 70)">
                        <circle r="22" fill="white" stroke="#334155" stroke-width="2.5" />
                        <text text-anchor="middle" dy="7" font-weight="bold" font-size="18">A</text>
                    </g>
                    <g transform="translate(320, 130)">
                        <line x1="0" y1="-30" x2="0" y2="30" stroke="#334155" stroke-width="2.5" />
                        <g transform="${isForward ? 'rotate(180)' : 'rotate(0)'}">
                            <path d="M -15,10 L 15,10 L 0,-15 Z" fill="#1e293b" />
                            <line x1="-15" y1="-15" x2="15" y2="-15" stroke="#1e293b" stroke-width="4" />
                        </g>
                    </g>
                    <path d="M 320,100 L 400,100 L 400,160 L 320,160" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5" />
                    <g transform="translate(400, 130)">
                        <circle r="20" fill="white" stroke="#94a3b8" stroke-width="2.5" />
                        <text text-anchor="middle" dy="6" font-size="14" font-weight="bold" fill="#64748b">V</text>
                    </g>
                    <text x="60" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">${t[lang].source}</text>
                </svg>
            `;
            document.getElementById('circuitSvgContainer').innerHTML = svg;
        }

        function renderTable() {
            const body = document.getElementById('tableBody');
            if (measurements.length === 0) {
                body.innerHTML = `<tr><td colspan="3" class="py-24 text-center text-slate-300 italic text-base font-medium">${t[lang].empty}</td></tr>`;
                return;
            }
            body.innerHTML = measurements.map((m, idx) => `
                <tr class="group transition-all duration-200 hover:scale-[1.01] ${m.forward ? 'bg-blue-50/40' : 'bg-amber-50/40'} rounded-2xl">
                    <td class="py-4 px-4 font-black text-slate-400 rounded-l-2xl">${idx + 1}</td>
                    <td class="py-4 text-center font-mono font-bold text-slate-800">${m.u}</td>
                    <td class="py-4 text-right px-4 font-mono font-black text-slate-900 rounded-r-2xl">
                        ${m.i} <span class="text-[10px] text-slate-400 font-medium ml-1">${m.unit}</span>
                    </td>
                </tr>
            `).join('');
        }

        function renderGraph() {
            const w = 600, h = 400, p = 50, areaW = w - 2 * p, zeroXPercent = 0.2, zeroX = p + areaW * zeroXPercent;
            const maxFU = 1.0, maxRU = 10.0, maxI = 50;
            const mapX = (u) => u >= 0 ? zeroX + (u/maxFU)*(areaW*(1-zeroXPercent)) : zeroX + (u/maxRU)*(areaW*zeroXPercent);
            const mapY = (i) => (p + (h-2*p)*0.7) - (i/maxI)*(h-2*p)*0.7;
            const sorted = [...measurements, {uSign: 0, val: 0}].sort((a,b) => a.uSign - b.uSign);
            const points = sorted.map(d => `${mapX(d.uSign)},${mapY(d.val)}`).join(' ');

            let svg = `
                <svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" class="bg-slate-50 rounded-xl overflow-visible">
                    ${[...Array(41)].map((_, i) => `<line x1="${p + (i*areaW)/40}" y1="${p}" x2="${p + (i*areaW)/40}" y2="${h-p}" stroke="#e2e8f0" stroke-width="${i%5===0?'1.2':'0.5'}" />`).join('')}
                    ${[...Array(41)].map((_, i) => `<line x1="${p}" y1="${p + (i*(h-2*p))/40}" x2="${w-p}" y2="${p + (i*(h-2*p))/40}" stroke="#e2e8f0" stroke-width="${i%5===0?'1.2':'0.5'}" />`).join('')}
                    <line x1="${p}" y1="${mapY(0)}" x2="${w-p}" y2="${mapY(0)}" stroke="#64748b" stroke-width="2.5" />
                    <line x1="${zeroX}" y1="${p}" x2="${zeroX}" y2="${h-p}" stroke="#64748b" stroke-width="2.5" />
                    <text x="${zeroX + 5}" y="${p + 15}" font-size="12" font-weight="bold" fill="#475569">I, ${t[lang].ma}</text>
                    <text x="${w - p}" y="${mapY(0) + 20}" font-size="12" font-weight="bold" fill="#475569" text-anchor="end">U, ${t[lang].vUnit}</text>
                    <polyline fill="none" stroke="#2563eb" stroke-width="3" points="${points}" stroke-linejoin="round" stroke-linecap="round" />
                    ${measurements.map(d => `<circle cx="${mapX(d.uSign)}" cy="${mapY(d.val)}" r="4" fill="#1e40af" stroke="white" stroke-width="1.5" />`).join('')}
                    <!-- Числа на осях с единицами измерения -->
                    <text x="${w-p}" y="${mapY(0)+12}" font-size="10" fill="#94a3b8" text-anchor="end">${maxFU} ${t[lang].vUnit}</text>
                    <text x="${p}" y="${mapY(0)+12}" font-size="10" fill="#94a3b8" text-anchor="start">-${maxRU} ${t[lang].vUnit}</text>
                </svg>
            `;
            
            let footer = measurements.length < 5 ? 
                `<p class="text-xs text-slate-400 font-medium bg-slate-100 px-4 py-2 rounded-full italic mt-4">${t[lang].hint.replace('{n}', 5 - measurements.length)}</p>` :
                `<p class="text-xs text-green-600 font-bold bg-green-50 px-4 py-2 rounded-full border border-green-100 mt-4">${t[lang].ready}</p>`;

            document.getElementById('graphContainer').innerHTML = svg + footer;
        }
        updateUI();
    </script>
</body>
</html>
